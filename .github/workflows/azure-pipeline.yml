name: Secure AI Audit Assistant CI/CD (Azure)

on:
  push:
    branches: [ "main", "master", "test-branch" ]
  pull_request:
    branches: [ "main", "master", "test-branch" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
    - name: Run Backend Tests
      run: |
        cd backend
        PYTHONPATH=. pytest tests/ --ignore=tests/integration -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Run Frontend Unit Tests
      run: |
        cd frontend
        npm run test:unit
        
  e2e-tests:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    - name: Install Playwright Browsers
      run: |
        cd frontend
        npx playwright install --with-deps chromium
    - name: Start Databases (Docker Compose)
      run: docker compose up -d postgres neo4j chromadb
    - name: Wait for Databases
      run: sleep 15
    - name: Start Backend
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        export NEO4J_URI=bolt://localhost:7687
        export NEO4J_USER=neo4j
        export NEO4J_PASSWORD=neo4jpassword
        export DATABASE_URL=postgresql+asyncpg://secure:secure@localhost:5432/secure_audit
        export CHROMA_HTTP_URL=http://localhost:8000
        export DOC_STORAGE_DIR=./data/documents
        alembic upgrade head
        PYTHONPATH=. python app/scripts/seed.py
        uvicorn app.main:app --host 0.0.0.0 --port 8080 &
        sleep 5
    - name: Start Frontend
      run: |
        cd frontend
        export VITE_API_BASE_URL=http://localhost:8080
        npm run dev &
        sleep 5
    - name: Run Playwright tests
      run: |
        cd frontend
        npm run test:e2e
        
  build-and-deploy-backend:
    needs: [test-backend, e2e-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
    - uses: actions/checkout@v3

    # 1. Log in to GitHub Container Registry
    - name: Log in to the Container registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. Build and push Docker image
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        labels: ${{ steps.meta.outputs.labels }}

    # 3. Authenticate to Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 4. Deploy to Azure Container Apps
    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
        containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
        imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      - name: Build And Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory
          skip_deploy_on_missing_secrets: true
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
