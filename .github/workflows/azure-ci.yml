name: CI / Build / Deploy to Azure

# CI workflow for Secure AI Audit Assistant
# Triggers on push to main (change as needed). It will:
# - run backend unit tests
# - build and push backend and frontend Docker images to ACR
# - deploy frontend to Azure Static Web Apps (if token provided)
# - deploy backend to Azure App Service (container) (if app name provided)

on:
  push:
    branches: [ main, test_cloud2 ]
  pull_request:
    branches: [ main, test_cloud2 ]

env:
  RESOURCE_GROUP: secure-ai-rg
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_IMAGE_PREFIX: ${{ secrets.ACR_NAME }}.azurecr.io/secureai

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run backend tests
        working-directory: backend
        run: |
          if [ -d tests ]; then pytest -q; else echo "No backend tests found"; fi

  build-and-push:
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: |
          ACR_LOGIN=$(az acr show --name ${{ env.ACR_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query loginServer -o tsv)
          echo "ACR_LOGIN=$ACR_LOGIN" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        run: |
          echo "Backend image: ${{ steps.acr.outputs.ACR_LOGIN }}/backend:${{ github.sha }}"
          az acr login --name ${{ env.ACR_NAME }}
          docker build -t ${{ steps.acr.outputs.ACR_LOGIN }}/backend:${{ github.sha }} -f backend/Dockerfile backend
          docker push ${{ steps.acr.outputs.ACR_LOGIN }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          echo "Frontend image: ${{ steps.acr.outputs.ACR_LOGIN }}/frontend:${{ github.sha }}"
          az acr login --name ${{ env.ACR_NAME }}
          docker build -t ${{ steps.acr.outputs.ACR_LOGIN }}/frontend:${{ github.sha }} -f frontend/Dockerfile frontend
          docker push ${{ steps.acr.outputs.ACR_LOGIN }}/frontend:${{ github.sha }}

  deploy-backend:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Web App container image
        if: ${{ secrets.AZURE_WEBAPP_NAME != '' }}
        run: |
          ACR_LOGIN=$(az acr show --name ${{ secrets.ACR_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query loginServer -o tsv)
          IMAGE=$ACR_LOGIN/backend:${{ github.sha }}
          echo "Setting webapp ${{ secrets.AZURE_WEBAPP_NAME }} to use image $IMAGE"
          az webapp config container set -n ${{ secrets.AZURE_WEBAPP_NAME }} -g ${{ env.RESOURCE_GROUP }} --docker-custom-image-name $IMAGE --docker-registry-server-url https://$ACR_LOGIN

  deploy-frontend-static:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        if: ${{ secrets.AZURE_STATIC_WEBAPPS_API_TOKEN != '' }}
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEBAPPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "frontend/dist"

# Secrets required (set these in your GitHub repo settings > Secrets):
# - AZURE_CREDENTIALS: JSON service principal for azure/login action
# - ACR_NAME: Azure Container Registry name
# - AZURE_WEBAPP_NAME: (optional) App Service name for backend container
# - AZURE_APP_SERVICE_PLAN: (optional) App Service plan name if creating a new webapp
# - AZURE_STATIC_WEBAPPS_API_TOKEN: (optional) token for Static Web Apps deployment
